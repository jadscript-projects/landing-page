# Vite build and deploy to a Google Cloud Storage bucket.
#
# Authentication — pick ONE approach (repository Variables / Secrets):
#
# A) Workload Identity Federation (recommended): use the variables GCP_WORKLOAD_IDENTITY_PROVIDER +
#    GCP_SERVICE_ACCOUNT (set GCP_USE_WIF=true only if you want to explicitly validate).
# B) JSON Key: secret GCP_SA_KEY (not available in forked PRs).
# Common variable: GCP_BUCKET. For details and gcloud commands, see DEPLOY.md.
#
# If GCP_* live under a GitHub Environment, set repository variable DEPLOY_ENVIRONMENT to
# that environment's name (e.g. production) so the job can reference it without a literal
# that some IDEs wrongly flag as invalid.

name: Deploy to GCS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Repository variable DEPLOY_ENVIRONMENT = GitHub Environment name where GCP_* live (e.g. production)
    environment: ${{ vars.DEPLOY_ENVIRONMENT }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require repository variable DEPLOY_ENVIRONMENT
        env:
          DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT }}
        run: |
          if [ -z "$DEPLOY_ENVIRONMENT" ]; then
            echo "::error::Set repository variable DEPLOY_ENVIRONMENT to the GitHub Environment name that holds your GCP_* variables (e.g. production). Settings → Actions → Variables → Repository variables."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Require GCP authentication (WIF or JSON key)
        id: gcp_auth
        env:
          GCP_USE_WIF: ${{ vars.GCP_USE_WIF }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          wif_complete=0
          if [ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] && [ -n "$GCP_SERVICE_ACCOUNT" ]; then
            wif_complete=1
          fi

          if [ "$GCP_USE_WIF" = "true" ] && [ "$wif_complete" -ne 1 ]; then
            echo "::error::When GCP_USE_WIF is true, you must set GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT (GitHub → Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

          if [ "$wif_complete" -eq 1 ]; then
            echo "mode=wif" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$GCP_SA_KEY" ]; then
            echo "mode=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "::error::No GCP authentication configured. Choose ONE of the following."
            echo ""
            echo "Option A — Workload Identity Federation (recommended; works on fork PRs without a JSON secret)"
            echo "  Where: GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "  • GCP_WORKLOAD_IDENTITY_PROVIDER — full provider resource string, format:"
            echo "    projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID"
            echo "    How to obtain: after creating the pool/provider in GCP (see DEPLOY.md §1.4), run in Cloud Shell or locally:"
            echo "    echo \"projects/\${PROJECT_NUMBER}/locations/global/workloadIdentityPools/\${POOL_ID}/providers/\${PROVIDER_ID}\""
            echo "    PROJECT_NUMBER: gcloud projects describe YOUR_PROJECT_ID --format='value(projectNumber)'"
            echo "  • GCP_SERVICE_ACCOUNT — service account email used for deploy, e.g.:"
            echo "    github-actions-gcs-deploy@YOUR_PROJECT_ID.iam.gserviceaccount.com"
            echo "    How to obtain: GCP Console → IAM → Service accounts, or SA_EMAIL from DEPLOY.md commands."
            echo ""
            echo "Option B — JSON key secret (only if your organization allows key creation)"
            echo "  Where: GitHub → Actions → Secrets → GCP_SA_KEY (paste the full JSON)"
            echo "  How to obtain: GCP → Service account → Keys → Add key → JSON (unless iam.disableServiceAccountKeyCreation blocks it)."
            echo ""
            echo "Required for sync: GCP_BUCKET variable (bucket name, e.g. landing-page)."
            echo "Step-by-step documentation: DEPLOY.md in this repository."
            echo "Note: workflows on fork PRs do not receive secrets; use Option A on the upstream repository."
          } >&2
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: steps.gcp_auth.outputs.mode == 'wif'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (service account key)
        if: steps.gcp_auth.outputs.mode == 'key'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Sync dist/ to bucket
        env:
          GCP_BUCKET: ${{ vars.GCP_BUCKET }}
        run: |
          if [ -z "$GCP_BUCKET" ]; then
            echo "::error::Set the GCP_BUCKET repository variable (GCS bucket name)."
            exit 1
          fi
          gcloud storage rsync dist/ "gs://${GCP_BUCKET}/" \
            --recursive \
            --delete-unmatched-destination-objects
