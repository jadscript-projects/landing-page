# Vite build and deploy to a Google Cloud Storage bucket.
#
# Authentication — pick ONE approach (repository Variables / Secrets):
#
# A) Workload Identity Federation (recommended; no JSON key — required if org policy
#    iam.disableServiceAccountKeyCreation is enforced):
#   Variables: GCP_USE_WIF = true
#              GCP_WORKLOAD_IDENTITY_PROVIDER = projects/…/locations/…/providers/…
#              GCP_SERVICE_ACCOUNT = your-sa@project.iam.gserviceaccount.com
#
# B) Service account key (only if your org allows key creation):
#   Secret: GCP_SA_KEY — full JSON key (do not set GCP_USE_WIF to true)
#
# Common variable:
#   GCP_BUCKET — GCS bucket name (e.g. landing-page)
#
# WIF setup: https://github.com/google-github-actions/auth#workload-identity-federation
#
# Fork PRs: secrets are not available to workflows from forks; use WIF + repo variables,
# or skip deploy on pull_request from forks.

name: Deploy to GCS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Fail fast with a clear message — auth@v3 errors if both WIF inputs and credentials_json are empty/missing.
      - name: Validate GCP auth configuration
        env:
          GCP_USE_WIF: ${{ vars.GCP_USE_WIF }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          if [ "$GCP_USE_WIF" = "true" ]; then
            if [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] || [ -z "$GCP_SERVICE_ACCOUNT" ]; then
              echo "::error title=Missing WIF variables::When repository variable GCP_USE_WIF is \"true\", set GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT."
              exit 1
            fi
          else
            if [ -z "$GCP_SA_KEY" ]; then
              echo "::error title=Missing GCP_SA_KEY::Set repository secret GCP_SA_KEY, or set GCP_USE_WIF=true with WIF variables. Secrets are not passed to workflows from forks (including some Dependabot jobs)."
              exit 1
            fi
          fi

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: ${{ vars.GCP_USE_WIF == 'true' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (service account key)
        if: ${{ vars.GCP_USE_WIF != 'true' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Sync dist/ to bucket
        env:
          GCP_BUCKET: ${{ vars.GCP_BUCKET }}
        run: |
          if [ -z "$GCP_BUCKET" ]; then
            echo "Set the GCP_BUCKET repository variable (GCS bucket name)."
            exit 1
          fi
          gcloud storage rsync dist/ "gs://${GCP_BUCKET}/" \
            --recursive \
            --delete-unmatched-destination-objects
